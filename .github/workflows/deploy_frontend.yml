name: Deploy React to GCS

on:
  push:
    branches:
      - main
    paths:
      - 'website/**' # This tells GitHub ONLY to deploy if frontend files change, saving you time!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and Build
      working-directory: ./website  #Tells the robot to enter the website folder
      run: |
        npm install
        npm run build

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Upload to Cloud Storage
      uses: google-github-actions/upload-cloud-storage@v2
      with:
        path: 'website/dist'        # <--- NEW: Tells the robot where the compiled files are now located
        destination: 'copilot_website'
        parent: false
        headers: |-
          cache-control: no-store, no-cache, must-revalidate, max-age=0